---
# Kopier-Vorlage für <project>/.ai-review/config.yaml
version: "1.0"

reviewers:
  codex: gpt-5
  cursor: composer-2
  gemini: gemini-2.5-pro
  claude: claude-opus-4-7

stages:
  code_review:
    enabled: true
    blocking: true
    timeout_seconds: 600
  cursor_review:
    enabled: true
    blocking: false
  security:
    enabled: true
    blocking: true
  design:
    enabled: true
    blocking: false
  ac_validation:
    enabled: true
    blocking: true
    judge_model: gpt-5
    second_opinion_model: claude-opus-4-7
    min_coverage: 1.0

consensus:
  success_threshold: 8
  soft_threshold: 5
  fail_closed_on_missing_stage: true

notifications:
  target: discord
  discord:
    channel_id: "REPLACE_WITH_CHANNEL_ID"
    mention_role: "@here"
    sticky_message: true

waivers:
  min_reason_length: 30
  allowed_labels: ["pipeline-bootstrap"]
