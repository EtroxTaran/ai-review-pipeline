# NOTE: neuer Workflow (Stage 5), erstellt 2026-04-20
# Wave 5 — migrated to ai-review CLI 2026-04-20:
#   Interim python3 -c Inline-Block ersetzt durch ai-review ac-validate.
#   Datenbeschaffung (PR-Body, Issue-Bodies, Diff) via gh CLI + jq in Shell.
#   Commit-Status und PR-Comment-Posting bleibt in Shell (nicht Teil der CLI).

name: AI Review — AC Validation (Stage 5)

# Stage 5: Acceptance-Criteria-Validation.
# Prüft ob die PR die Gherkin-ACs aus dem verlinkten Issue abdeckt.
# Fail-Closed: kein verlinktes Issue oder keine ACs → score niedrig, status=failure.
# Schreibt Commit-Status `ai-review/ac-validation`, der vom Consensus-Aggregator
# aggregiert wird.
#
# Trigger: pull_request + edited (damit Body-Änderungen mit neuen Issue-Refs
# sofort re-validiert werden — kein neuer Commit nötig).

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ai-review-ac-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write  # Sticky-Comment mit AC-Coverage-Report
  statuses: write       # Commit-status ai-review/ac-validation

jobs:
  ac-validation:
    if: github.event.pull_request.draft == false
    runs-on: [self-hosted, r2d2, ai-review]
    timeout-minutes: 15
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ai-review-pipeline
        run: pip install ai-review-pipeline

      - name: Fetch PR body + linked issues + diff into temp files
        id: fetch_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          WORKDIR=$(mktemp -d)
          echo "workdir=$WORKDIR" >> "$GITHUB_OUTPUT"

          # PR-Body und closing issue numbers holen
          gh pr view "$PR_NUMBER" --json body,closingIssuesReferences,files \
            > "$WORKDIR/pr_meta.json"

          # PR-Body in eigene Datei schreiben
          jq -r '.body // ""' "$WORKDIR/pr_meta.json" > "$WORKDIR/pr_body.txt"

          # Geänderte Files als komma-separierte Liste
          jq -r '[.files[].path] | join(",")' "$WORKDIR/pr_meta.json" \
            > "$WORKDIR/changed_files.txt"
          CHANGED_FILES=$(cat "$WORKDIR/changed_files.txt")
          echo "changed_files=$CHANGED_FILES" >> "$GITHUB_OUTPUT"

          # Diff (cap 30k chars)
          gh pr diff "$PR_NUMBER" 2>/dev/null \
            | head -c 30000 > "$WORKDIR/pr_diff.txt" || true

          # Linked-Issues-JSON aufbauen: { "N": ["issue body text"] }
          # closingIssuesReferences: [{number: N, ...}, ...]
          ISSUE_NUMS=$(jq -r '.closingIssuesReferences[].number // empty' "$WORKDIR/pr_meta.json")
          echo "{}" > "$WORKDIR/linked_issues.json"
          for ISSUE_NUM in $ISSUE_NUMS; do
            ISSUE_BODY=$(gh issue view "$ISSUE_NUM" --json body --jq '.body // ""' 2>/dev/null || echo "")
            # JSON-sicher escapen via python3 (einzeiler — keine Pipeline-Abhängigkeit)
            python3 -c "
          import json, sys
          current = json.load(open('$WORKDIR/linked_issues.json'))
          current[str($ISSUE_NUM)] = [sys.argv[1]]
          json.dump(current, open('$WORKDIR/linked_issues.json', 'w'))
          " "$ISSUE_BODY"
          done

      - name: Run Stage 5 — AC Coverage Validation
        id: ac_validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          # ANTHROPIC_API_KEY: Runner-OAuth-Store auf r2d2 liefert den Key.
          # Falls Consumer-Repo keinen self-hosted-Runner mit OAuth nutzt:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WORKDIR: ${{ steps.fetch_data.outputs.workdir }}
          CHANGED_FILES: ${{ steps.fetch_data.outputs.changed_files }}
        run: |
          set -euo pipefail

          # ai-review ac-validate aufrufen; stdout in Datei für spätere Auswertung
          set +e
          ai-review ac-validate \
            --pr-body-file       "$WORKDIR/pr_body.txt" \
            --linked-issues-file "$WORKDIR/linked_issues.json" \
            --changed-files      "$CHANGED_FILES" \
            --diff-file          "$WORKDIR/pr_diff.txt" \
            > "$WORKDIR/ac_output.txt" 2>&1
          AC_EXIT=$?
          set -e

          cat "$WORKDIR/ac_output.txt"

          # Score + Confidence aus der ersten Ausgabezeile parsen
          # Format: "✅ AC-Validation: score=X/10, confidence=Y.YY, waived=Z"
          FIRST_LINE=$(head -n1 "$WORKDIR/ac_output.txt" | sed 's/[^[:print:]]//g')
          SCORE=$(echo "$FIRST_LINE"    | grep -oP 'score=\K[0-9]+' || echo "0")
          CONFIDENCE=$(echo "$FIRST_LINE" | grep -oP 'confidence=\K[0-9.]+' || echo "0")
          WAIVED=$(echo "$FIRST_LINE"   | grep -oP 'waived=\K\w+' || echo "False")

          # State aus Score ableiten (spiegelt _handle_ac_validate-Logik)
          if   [ "$SCORE" -ge 8 ]; then STATE="success"
          elif [ "$SCORE" -ge 5 ]; then STATE="pending"   # soft — Consensus fragt nach
          else                          STATE="failure"
          fi

          SUMMARY="AC-Coverage score ${SCORE}/10 (confidence $(printf '%.0f' "$(echo "$CONFIDENCE * 100" | bc)")%)"
          echo "AC-Validation: $STATE — $SUMMARY"

          echo "state=$STATE"       >> "$GITHUB_OUTPUT"
          echo "score=$SCORE"       >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY"   >> "$GITHUB_OUTPUT"
          echo "exit_code=$AC_EXIT" >> "$GITHUB_OUTPUT"

      - name: Set commit status ai-review/ac-validation
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          STATE: ${{ steps.ac_validation.outputs.state }}
          SUMMARY: ${{ steps.ac_validation.outputs.summary }}
        run: |
          set -euo pipefail
          TARGET_URL="${GITHUB_SERVER_URL}/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}"
          gh api "repos/${{ github.repository }}/statuses/$PR_HEAD_SHA" \
            -f state="$STATE" \
            -f context="ai-review/ac-validation" \
            -f description="${SUMMARY:0:140}" \
            -f target_url="$TARGET_URL"
          echo "Commit-Status gesetzt: $STATE — $SUMMARY"

      - name: Post AC-Validation report as PR comment (failure/pending only)
        if: steps.ac_validation.outputs.state != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STATE: ${{ steps.ac_validation.outputs.state }}
          SCORE: ${{ steps.ac_validation.outputs.score }}
          WORKDIR: ${{ steps.fetch_data.outputs.workdir }}
        run: |
          set -euo pipefail

          # Findings aus dem CLI-Output extrahieren (alle Zeilen nach der ersten)
          FINDINGS=$(tail -n +2 "$WORKDIR/ac_output.txt" | sed 's/[^[:print:]]//g')

          # Comment-Body bauen
          BODY=$(cat <<EOF
          <!-- ai-review-ac-validation -->
          ## AC-Validation Report

          **Score:** ${SCORE}/10 | **Status:** ${STATE}

          ${FINDINGS}

          _Waiver: \`/ai-review ac-waiver <reason ≥30 chars>\`_
          EOF
          )

          # Existierenden AC-Comment updaten oder neu posten
          EXISTING_ID=$(gh api \
            "repos/${{ github.repository }}/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("ai-review-ac-validation")) | .id' \
            | head -n1 || echo "")

          if [ -n "$EXISTING_ID" ]; then
            gh api -X PATCH \
              "repos/${{ github.repository }}/issues/comments/$EXISTING_ID" \
              -f body="$BODY" >/dev/null
            echo "AC-Validation-Comment aktualisiert (id=$EXISTING_ID)"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
            echo "AC-Validation-Comment neu gepostet"
          fi

      - name: Cleanup temp files
        if: always()
        env:
          WORKDIR: ${{ steps.fetch_data.outputs.workdir }}
        run: |
          [ -n "$WORKDIR" ] && rm -rf "$WORKDIR" || true
